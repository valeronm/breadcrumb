# Robolectric emulates up to SDK 36; the app targets 37, and it refuses to run a package whose
# targetSdkVersion is newer than the SDK it can emulate. The tests here exercise Room and the
# repository, neither of which depends on platform behaviour that changed in 37 — so pin them to
# the newest SDK Robolectric has, and raise this when Robolectric ships 37.
sdk=36
