name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check the tag matches versionCode
        run: |
          tag_vc="${GITHUB_REF_NAME##*-vc}"
          build_vc="$(sed -n 's/^ *versionCode = \([0-9]*\)$/\1/p' app/build.gradle.kts)"
          if [ "$tag_vc" != "$build_vc" ]; then
            echo "Tag $GITHUB_REF_NAME says versionCode $tag_vc but app/build.gradle.kts has $build_vc" >&2
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Materialize signing config
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
          UPLOAD_KEY_ALIAS: ${{ secrets.UPLOAD_KEY_ALIAS }}
          UPLOAD_STORE_PASSWORD: ${{ secrets.UPLOAD_STORE_PASSWORD }}
          PROTOMAPS_API_KEY: ${{ secrets.PROTOMAPS_API_KEY }}
        run: |
          echo "$UPLOAD_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
          cat > keystore.properties <<EOF
          uploadStoreFile=$RUNNER_TEMP/upload.jks
          uploadKeyAlias=$UPLOAD_KEY_ALIAS
          uploadStorePassword=$UPLOAD_STORE_PASSWORD
          EOF
          echo "protomapsApiKey=$PROTOMAPS_API_KEY" > local.properties

      - name: Build release bundle
        run: ./gradlew :app:bundleRelease

      - name: Create GitHub release with the bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version_name="1.0+$(git describe --always --dirty)"
          bundle="breadcrumb-$GITHUB_REF_NAME.aab"
          cp app/build/outputs/bundle/release/app-release.aab "$bundle"
          gh release create "$GITHUB_REF_NAME" \
            "$bundle" \
            --title "$GITHUB_REF_NAME" \
            --notes "Play upload bundle, versionName $version_name, built from $GITHUB_SHA."
